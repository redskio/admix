name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /admix
          GITHUB_ACTIONS: "true"

      - name: Fix 404.html basePath (replace with redirect)
        run: |
          cat > out/404.html << 'EOF'
          <!DOCTYPE html>
          <html lang="ko">
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=/admix/">
            <script>
              var path = window.location.pathname;
              if (path.startsWith('/admix/')) {
                // valid subpath — let Next.js SPA handle it via index
                window.location.replace('/admix/');
              } else {
                window.location.replace('/admix/');
              }
            </script>
            <title>AdMix</title>
          </head>
          <body>
            <p>페이지를 찾을 수 없습니다. <a href="/admix/">홈으로</a></p>
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
